# PROGRAMAS EXCLUIDOS DEL INFORME
# Programas que existen en la base del Icfes pero que NO se incluyen en el informe oficial
# (decision editorial: alinear el informe con la presentacion ejecutiva 2025).
# Los nombres deben coincidir con el campo PROGRAMA_ACADEMICO del Icfes tras la
# normalizacion (mayusculas y sin tildes).
#
# Caso "Licenciatura en Informatica":
#   - El SNIES viejo "LICENCIATURA EN EDUCACION BASICA CON ENFASIS EN INFORMATICA"
#     (PROM 2025: 136, n=9) ya no admite nuevos estudiantes.
#   - El SNIES nuevo "LICENCIATURA EN INFORMATICA" (PROM 2025: 172, n=1) es el reemplazo
#     y es el que la presentacion ejecutiva trata como vigente.
#   - Por eso aqui excluimos el codigo viejo y conservamos el nuevo.
programas_excluidos:
  - "LICENCIATURA EN EDUCACION BASICA CON ENFASIS EN INFORMATICA"

# RENOMBRADO DE PROGRAMAS POR ID INTERNO DEL ICFES (NO es SNIES del MEN)
# La columna ID_PROGRAMA_ACAD del Excel del Icfes contiene un identificador interno
# que el Icfes usa para diferenciar programas con el mismo nombre. No corresponde al
# codigo SNIES oficial del Ministerio.
# Cuando dos registros tienen el mismo NOMBRE_PROGRAMA_ACAD pero diferente
# ID_PROGRAMA_ACAD (p. ej. modalidades presencial / distancia o codigos viejos /
# nuevos del MEN), aqui mapeamos cada ID a un nombre diferenciado para que el informe
# los muestre como programas separados.
programas_por_id_icfes:
  24800: "LICENCIATURA EN LITERATURA Y LENGUA CASTELLANA (PRESENCIAL)"
  25112: "LICENCIATURA EN LITERATURA Y LENGUA CASTELLANA (DISTANCIA)"

